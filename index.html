<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目的地與周邊停車場導覽</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom scrollbar for sidebar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-scroll::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden text-gray-800 font-sans">

    <div class="flex flex-col md:flex-row h-full">
        
        <!-- Sidebar -->
        <div class="w-full md:w-1/3 lg:w-1/4 bg-white shadow-xl z-10 flex flex-col h-1/2 md:h-full order-2 md:order-1 relative">
            
            <!-- Header -->
            <div class="p-6 bg-gradient-to-r from-blue-600 to-indigo-700 text-white shrink-0">
                <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    周邊停車導覽
                </h1>
                <p class="text-blue-100 mt-2 text-sm opacity-90">點擊按鈕可直接開啟 Google Maps 導航。</p>
            </div>

            <!-- List Container -->
            <div class="flex-1 overflow-y-auto sidebar-scroll p-4 bg-gray-50">
                
                <!-- Destination Section -->
                <div class="mb-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 px-1 border-b pb-1">目的地</h2>
                    
                    <div class="group bg-white rounded-xl p-4 shadow-sm border border-red-100 mb-3">
                        <div class="flex items-start gap-3">
                            <div class="bg-red-100 text-red-600 rounded-full p-2 mt-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800 text-lg">福氣家芳香好眠spa按摩館</h3>
                                <p class="text-xs text-gray-500 mt-1 mb-3">新竹市東區光復路二段295號12樓之3</p>
                                <a href="https://www.google.com/maps/search/?api=1&query=新竹市東區光復路二段295號12樓之3" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-sm bg-red-50 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-600 hover:text-white transition-colors border border-red-100 font-medium">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                    開啟導航
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Parking Section -->
                <div>
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 px-1 border-b pb-1">附近停車場（無特約）</h2>
                    
                    <div id="parking-list" class="space-y-3">
                        <!-- Parking items injected via JS -->
                    </div>
                </div>
                
            </div>
        </div>

        <!-- Static Map Screenshot Container -->
        <div class="w-full md:w-2/3 lg:w-3/4 h-1/2 md:h-full order-1 md:order-2 bg-gray-200 flex items-center justify-center overflow-hidden">
            <!-- 請將下方 src 的網址替換為您的截圖檔案路徑，例如 src="my-map-screenshot.png" -->
            <img src="parking.png" 
                 alt="地圖截圖" 
                 class="w-full h-full object-cover">
        </div>
        
    </div>
    
    <script>
        // --- Parking Data ---
        const parkingLocations = [
            {
                id: 'p1',
                title: '帝國經貿大樓停車場',
                link: 'https://maps.app.goo.gl/fWFgVrkwk8xfNUyG6',
                desc: '距離目的地最近的停車選擇'
            },
            {
                id: 'p2',
                title: '嘟嘟房停車場 (光復站)',
                link: 'https://maps.app.goo.gl/bQa1weHk8nT54wW87',
                desc: '連鎖停車場，車位多'
            },
            {
                id: 'p3',
                title: '園道五地下停車場',
                link: 'https://maps.app.goo.gl/oQs5ngPZ6yWSxWgD8',
                desc: '公有地下停車場，空間寬敞'
            }
        ];

        // --- Build UI ---
        const parkingListContainer = document.getElementById('parking-list');

        parkingLocations.forEach(loc => {
            const parkingCard = `
                <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                    <div class="flex items-start gap-3">
                        <div class="bg-blue-50 text-blue-600 rounded-full w-8 h-8 flex items-center justify-center shrink-0 mt-1 font-bold border border-blue-100">
                            P
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">${loc.title}</h3>
                            <p class="text-xs text-gray-500 mt-1 mb-3">${loc.desc}</p>
                            <a href="${loc.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-sm bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-600 hover:text-white transition-colors border border-blue-100 font-medium">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                開啟導航
                            </a>
                        </div>
                    </div>
                </div>
            `;
            parkingListContainer.insertAdjacentHTML('beforeend', parkingCard);
        });
    </script>
</body>
</html>
